<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASRS Analytics Pro | Manuel Rivera</title>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root { --bg-dark: #0f111a; --card-bg: #1a1d2b; --accent: #008ffb; --text-main: #e0e6ed; --success: #00e396; }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Segoe UI', sans-serif; }
        .card { background-color: var(--card-bg); border: none; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.4); margin-bottom: 20px; }
        .filter-pane { background-color: var(--card-bg); padding: 1.5rem; border-radius: 12px; border: 1px solid #2d324a; }
        .form-select { background-color: #25293d !important; border: 1px solid #3d4466 !important; color: white !important; }
        optgroup { color: #8892b0; font-weight: bold; font-style: normal; background-color: #1a1d2b;}
        .btn-primary { background-color: var(--accent); border: none; font-weight: 600; padding: 10px; }
        .kpi-title { font-size: 0.75rem; text-transform: uppercase; color: #8892b0; letter-spacing: 1px; }
        .kpi-value { font-size: 1.8rem; font-weight: 700; }
        #loader { display: none; position: fixed; top: 20px; right: 20px; z-index: 9999; }
        
        /* Tabla */
        .table-custom { color: var(--text-main); font-size: 0.9rem; margin-bottom: 0; }
        .table-custom thead { background-color: #25293d; position: sticky; top: 0; z-index: 1; }
        .table-custom th { border-bottom: 2px solid #3d4466; color: #8892b0; font-weight: 600; text-transform: uppercase; font-size: 0.75rem;}
        .table-custom td { border-bottom: 1px solid #2d324a; vertical-align: middle; }
        .table-container { max-height: 400px; overflow-y: auto; border-radius: 8px; border: 1px solid #2d324a; }
        
        .footer-signature { border-top: 1px solid #2d324a; padding-top: 15px; margin-top: 40px; color: #8892b0; font-size: 0.85rem; }
    </style>
</head>
<body>

<div id="loader" class="spinner-border text-info" role="status"></div>

<div class="container py-4">
    <header class="mb-4 d-flex justify-content-between align-items-center">
        <div>
            <h1 class="mb-0">ASRS <span style="color: var(--accent)">SmartView</span></h1>
            <p class="text-muted small mb-0">Ingeniería Industrial Goodyear | Área L504</p>
        </div>
        <span class="badge bg-dark border border-info p-2"><i class="bi bi-robot"></i> Activos L504</span>
    </header>

    <section class="filter-pane mb-4">
        <div class="row g-3 align-items-end">
            <div class="col-md-2">
                <label class="small text-muted">Año</label>
                <select id="selYear" class="form-select" onchange="refreshDashboard()">
                    <option value="2026" selected>2026</option>
                    <option value="2025">2025</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="small text-muted">Mes</label>
                <select id="selMonth" class="form-select" onchange="refreshDashboard()">
                    <option value="01">Enero</option><option value="02">Febrero</option>
                    <option value="03" selected>Marzo</option><option value="04">Abril</option>
                    <option value="05">Mayo</option><option value="06">Junio</option>
                    <option value="07">Julio</option><option value="08">Agosto</option>
                    <option value="09">Septiembre</option><option value="10">Octubre</option>
                    <option value="11">Noviembre</option><option value="12">Diciembre</option>
                </select>
            </div>
            <div class="col-md-5">
                <label class="small text-muted">Activo Específico (Inventario SAP)</label>
                <select id="selMachine" class="form-select" onchange="refreshDashboard()">
                    <option value="0">--- Todos los Activos L504 ---</option>
                    <optgroup label="CRANES (Transelevadores)">
                        <option value="L504-CRANE01">L504-CRANE01</option><option value="L504-CRANE02">L504-CRANE02</option>
                        <option value="L504-CRANE03">L504-CRANE03</option><option value="L504-CRANE04">L504-CRANE04</option>
                        <option value="L504-CRANE05">L504-CRANE05</option><option value="L504-CRANE06">L504-CRANE06</option>
                        <option value="L504-CRANE07">L504-CRANE07</option><option value="L504-CRANE08">L504-CRANE08</option>
                        <option value="L504-CRANE09">L504-CRANE09</option><option value="L504-CRANE10">L504-CRANE10</option>
                        <option value="L504-CRANE11">L504-CRANE11</option>
                    </optgroup>
                    <optgroup label="PRESS ROBOTS">
                        <option value="L504-400B">L504-400B</option><option value="L504-500A">L504-500A</option>
                        <option value="L504-500B">L504-500B</option><option value="L504-600A">L504-600A</option>
                        <option value="L504-600B">L504-600B</option>
                    </optgroup>
                    <optgroup label="ZONA 12 & 13">
                        <option value="L504-Z12-INTRALOX">L504-Z12-INTRALOX</option>
                        <option value="L504-Z13-INTRALOX">L504-Z13-INTRALOX</option>
                    </optgroup>
                </select>
            </div>
            <div class="col-md-3">
                <button onclick="refreshDashboard()" class="btn btn-primary w-100">
                    <i class="bi bi-arrow-repeat"></i> ACTUALIZAR PANEL
                </button>
            </div>
        </div>
    </section>

    <div class="row mb-4">
        <div class="col-md-6 text-center">
            <div class="card p-3 border-start border-info border-4">
                <div class="kpi-title">Downtime Acumulado (Mes)</div>
                <div class="kpi-value text-info" id="kpiDwt">0.0 min</div>
            </div>
        </div>
        <div class="col-md-6 text-center">
            <div class="card p-3 border-start border-success border-4">
                <div class="kpi-title">Promedio Diario Perdido</div>
                <div class="kpi-value text-success" id="kpiAvg">0.0 min/día</div>
            </div>
        </div>
    </div>

    <div class="card p-4 mb-4">
        <div id="chartDowntime"></div>
    </div>

    <div class="card p-4">
        <h5 class="mb-4 text-muted"><i class="bi bi-tools"></i> Detalle de Averías</h5>
        <div class="table-container">
            <table class="table table-custom">
                <thead>
                    <tr>
                        <th>Orden</th><th>Fecha</th><th>Máquina</th><th>Min</th><th>Usuario</th><th>Descripción</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <footer class="footer-signature text-center">
        Desarrollado por <strong style="color: var(--text-main);">Manuel Rivera</strong> | Área ASRS - Goodyear
    </footer>
</div>

<script>
    let mainChart;
    const API_CHART = "http://10.107.194.72/ingenieria/static/phpscripts/mysql/Eng_Dashboard/zfdata_db.php";
    const API_TABLE = "http://10.107.194.72/ingenieria/static/phpscripts/mysql/Eng_Dashboard/zf_downtime_db.php";

    async function refreshDashboard() {
        document.getElementById('loader').style.display = 'block';
        const yearStr = document.getElementById('selYear').value;
        const monthStr = document.getElementById('selMonth').value;
        const machine = document.getElementById('selMachine').value;

        // --- Lógica de Fechas para el Servidor ---
        let dato = `${yearStr}-${monthStr}`;
        let dato1 = `${parseInt(yearStr) - 1}-${monthStr}`;
        let m = parseInt(monthStr), y = parseInt(yearStr);
        let dato6, dato7;
        if (m > 2) {
            dato6 = y + "-" + (m-1 < 10 ? "0"+(m-1) : m-1);
            dato7 = y + "-" + (m-2 < 10 ? "0"+(m-2) : m-2);
        } else if (m === 2) {
            dato6 = y + "-01"; dato7 = (y-1) + "-12";
        } else {
            dato6 = (y-1) + "-12"; dato7 = (y-1) + "-11";
        }

        const commonParams = new URLSearchParams();
        commonParams.append('fecha', dato);
        commonParams.append('room', 'DIV-B');
        commonParams.append('loc', 'AREA-ASRS');
        commonParams.append('fld', machine === "0" ? "" : machine);

        try {
            // 1. Gráfica y KPIs
            const chartBody = new URLSearchParams(commonParams);
            chartBody.append('fecha_past', dato1);
            chartBody.append('type', '1');
            chartBody.append('fecha1', dato6);
            chartBody.append('fecha2', dato7);
            chartBody.append('subtype', '3');
            chartBody.append('target[]', '0');

            const respChart = await fetch(API_CHART, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: chartBody.toString() 
            });
            const data = await respChart.json();
            const series = data[1] || [];

            // --- CÁLCULO DE PROMEDIO REAL ---
            const total = series.reduce((sum, val) => sum + parseFloat(val || 0), 0);
            const hoy = new Date();
            const esMesActual = (hoy.getMonth() + 1) == m && hoy.getFullYear() == y;
            
            // Si es el mes actual, dividimos por el día de hoy. Si es pasado, por los días del mes (series.length)
            let divisor = esMesActual ? hoy.getDate() : (series.length || 1);
            
            document.getElementById('kpiDwt').innerText = total.toFixed(1) + " min";
            document.getElementById('kpiAvg').innerText = (total / divisor).toFixed(1) + " min/día";

            // Render Gráfica
            const options = {
                series: [{ name: 'Minutos', data: series }],
                chart: { type: 'area', height: 350, foreColor: '#abb2bf' },
                colors: ['#008ffb'],
                stroke: { curve: 'smooth', width: 3 },
                xaxis: { categories: Array.from({length: series.length}, (_, i) => i + 1) }
            };
            if (mainChart) mainChart.destroy();
            mainChart = new ApexCharts(document.querySelector("#chartDowntime"), options);
            mainChart.render();

            // 2. Tabla
            const respTable = await fetch(API_TABLE, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: commonParams.toString() 
            });
            const dataT = await respTable.json();
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = "";
            if (dataT[5]) {
                for (let i = dataT[5].length - 1; i >= 0; i--) {
                    tbody.innerHTML += `<tr>
                        <td>${dataT[10][i] || '-'}</td>
                        <td>${dataT[5][i] || '-'}</td>
                        <td class="text-info">${dataT[2][i] || '-'}</td>
                        <td class="text-danger fw-bold">${dataT[9][i] || '0'}</td>
                        <td>${dataT[11][i] || '-'}</td>
                        <td class="small text-muted">${dataT[1][i] || '-'}</td>
                    </tr>`;
                }
            }
        } catch (e) { console.error(e); }
        finally { document.getElementById('loader').style.display = 'none'; }
    }
    window.onload = refreshDashboard;
</script>
</body>
</html>
